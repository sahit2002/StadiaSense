<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Secure, accessible, and personalized Venue Assistant">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://generativelanguage.googleapis.com">
  <title>StadiaSense | Smart Stadium Assistant</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash" aria-hidden="false">
    <h1 id="splash-title" style="font-weight: 500; letter-spacing: 2px;">Loading...</h1>
  </div>

  <!-- Ticket Authentication Portal -->
  <div id="ticket-portal" aria-hidden="true" role="dialog" aria-labelledby="auth-title">
    <div class="glass-card auth-card">
      <h2 id="auth-title">Authenticate Your Visit</h2>
      <p>Enter your <strong>Ticket Reference</strong> or <strong>Staff ID</strong> below to unlock your personalized guide.</p>
      
      <div class="input-group">
        <input type="text" id="ticket-input" placeholder="e.g. VIP-AA123" aria-label="Ticket Number" />
        <button id="auth-btn" class="tap-target" aria-label="Submit Ticket">Unlock 🔓</button>
      </div>
      <p id="auth-error" class="error-msg" aria-live="polite"></p>
      
      <div class="demo-hints">
        <small>Demo IDs: VIP-AA123, FAN-456, STAFF-001</small>
      </div>
    </div>
  </div>

  <!-- Settings / API Modal -->
  <div id="settings-modal" aria-hidden="true" role="dialog">
    <div class="glass-card modal-content">
      <h2>App Settings</h2>
      <label for="api-key-input">Gemini API Key (For Concierge):</label>
      <input type="password" id="api-key-input" placeholder="AIzaSy..." />
      <div style="display:flex; gap:1rem; margin-top:1rem;">
        <button id="save-key-btn" class="tap-target">Save securely</button>
        <button id="close-modal-btn" class="tap-target secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- Timesheet Overlay -->
  <div id="timesheet-modal" aria-hidden="true" role="dialog">
    <div class="glass-card timesheet-content">
      <div class="timesheet-header">
        <h2>Schedule</h2>
        <button id="close-timesheet-btn" class="tap-target small-btn">❌</button>
      </div>
      <div id="timesheet-error" style="color:var(--wait-bad); font-weight:800; font-size:0.9rem; text-align:center; min-height: 20px;"></div>
      <ul id="schedule-list"></ul>
    </div>
  </div>

  <!-- Main App View -->
  <header id="main-header">
    <div class="header-left">
      <div class="brand">
        <svg aria-hidden="true" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span id="app-title">StadiaSense</span>
      </div>
      <div class="user-greeting" id="user-greeting">Identifying...</div>
    </div>
    <div style="display:flex; gap:0.5rem; align-items: center;">
      <button id="logout-btn" class="tap-target small-text-btn" aria-label="Clear Session">Log Out</button>
      <button id="settings-btn" class="settings-btn tap-target" aria-label="Open Settings" role="button" tabindex="0">⚙️</button>
    </div>
  </header>

  <main>
    <section class="map-container">
      <div class="map-wrapper glass-card">
        <!-- Securely injected SVG map -->
        <svg class="venue-map" viewBox="0 0 400 400" aria-label="Stadium Map with zones">
          <!-- Zones -->
          <rect id="zone-north" x="150" y="20" width="100" height="80" class="zone-box" />
          <text x="200" y="65" class="zone-text">NORTH</text>
          
          <rect id="zone-south" x="150" y="300" width="100" height="80" class="zone-box" />
          <text x="200" y="345" class="zone-text">SOUTH</text>

          <rect id="zone-west" x="20" y="150" width="80" height="100" class="zone-box" />
          <text x="60" y="205" class="zone-text">WEST</text>

          <rect id="zone-east" x="300" y="150" width="80" height="100" class="zone-box" />
          <text x="340" y="205" class="zone-text">EAST</text>

          <!-- Field -->
          <rect x="120" y="120" width="160" height="160" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" rx="10" />
          <circle cx="200" cy="200" r="30" fill="transparent" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
          
          <path id="active-route" class="route-path" />
        </svg>
      </div>
    </section>

    <section class="dashboard-container">
      <div class="history-scroll" id="qa-feed" aria-live="polite"></div>
      <div class="quick-actions" id="quick-actions-grid"></div>
    </section>
  </main>

  <script src="./mockData.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
